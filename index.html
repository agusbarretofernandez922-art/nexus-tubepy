<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Tube · Con Nube</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body { 
            background: linear-gradient(145deg, #0b0710, #130c1f);
            min-height: 100vh;
            color: #e0e0ff;
        }
        :root {
            --nexus-purple: #8b5cf6;
            --nexus-blue: #3b82f6;
        }
        
        /* Layout */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Header */
        .top-bar {
            background: rgba(20, 14, 34, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--nexus-purple);
            padding: 0.6rem 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        .nexus-logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--nexus-purple) 20%, var(--nexus-blue) 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .search-bar {
            flex: 1;
            max-width: 600px;
            margin: 0 25px;
            display: flex;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid #3b2b68;
            background: #0d0821;
        }
        
        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        .search-bar button {
            background: linear-gradient(45deg, #6d28d9, #2563eb);
            border: none;
            color: white;
            padding: 0 25px;
            cursor: pointer;
        }
        
        .user-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .profile-badge {
            background: #392e63;
            border-radius: 30px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #140e22;
            border-right: 2px solid #382e55;
            padding: 20px 0;
            overflow-y: auto;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 18px;
            margin: 2px 10px;
            border-radius: 14px;
            color: #b5b0d6;
            cursor: pointer;
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, #402c7a, #1e2a5e);
            color: white;
            border-left: 4px solid var(--nexus-blue);
        }
        
        .upload-btn-sidebar {
            background: linear-gradient(145deg, #4a2b9c, #1f3f8f);
            border: 1px solid #a188ff;
            color: white;
            margin: 10px 16px;
            padding: 14px 0;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
        }
        
        /* Contenido */
        .content-area {
            flex: 1;
            padding: 24px 30px;
            overflow-y: auto;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px 18px;
            margin-top: 20px;
        }
        
        .video-card {
            background: #1e1733;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #352e4a;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .video-card:hover {
            transform: translateY(-8px);
            border-color: var(--nexus-purple);
        }
        
        .thumbnail {
            height: 150px;
            background: linear-gradient(145deg, #221c38, #0e0b1a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .duration {
            position: absolute;
            bottom: 8px;
            right: 12px;
            background: #0f0b1dd0;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--nexus-blue);
        }
        
        /* Modales */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 3, 18, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: #1f1940;
            border-radius: 48px;
            width: 90%;
            max-width: 500px;
            border: 3px solid var(--nexus-purple);
            padding: 30px;
        }
        
        .modal-content.large {
            max-width: 700px;
        }
        
        .close-modal {
            float: right;
            background: none;
            border: none;
            color: #c7b5ff;
            font-size: 2rem;
            cursor: pointer;
        }
        
        .input-field {
            width: 100%;
            padding: 15px 20px;
            background: #0b0620;
            border: 2px solid #41397a;
            border-radius: 60px;
            color: white;
            margin: 10px 0;
        }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #8b5cf6, #2563eb);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid #8b5cf6;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .dropzone {
            border: 3px dashed var(--nexus-blue);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- HEADER -->
        <header class="top-bar">
            <div class="logo-area">
                <div class="nexus-logo">
                    <i class="fas fa-play-circle"></i> NEXUS TUBE
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Buscar en Nexus...">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="user-actions">
                <i class="fas fa-video" id="uploadIconNav" style="font-size:1.5rem; cursor:pointer;"></i>
                <div class="profile-badge" id="profileDisplay">
                    <i class="fas fa-user-astronaut"></i>
                    <span id="userDisplayName">Invitado</span>
                </div>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div style="display: flex; flex: 1; overflow: hidden;">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div style="padding:0 16px;">
                    <div class="nav-item active">
                        <i class="fas fa-home"></i> Inicio
                    </div>
                    <div class="nav-item">
                        <i class="fas fa-compass"></i> Explorar
                    </div>
                    <div style="height:1px; background:linear-gradient(90deg, transparent, #8b5cf6, transparent); margin:20px 0;"></div>
                    <div class="upload-btn-sidebar" id="uploadSidebarBtn">
                        <i class="fas fa-cloud-upload-alt"></i> SUBIR VIDEO
                    </div>
                </div>
            </aside>

            <!-- CONTENIDO -->
            <main class="content-area">
                <h2 style="display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-bolt" style="background:#8b5cf6; padding:8px; border-radius:50%;"></i> 
                    Recomendados para ti
                </h2>
                <div class="video-grid" id="videoGrid"></div>
            </main>
        </div>
    </div>

    <!-- MODAL LOGIN -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <button class="close-modal" id="closeAuthModal">&times;</button>
            <h2 style="color:#8b5cf6; margin-bottom:20px;"><i class="fas fa-user-astronaut"></i> Acceso Nexus</h2>
            
            <div id="loginForm">
                <input type="text" id="loginUsername" class="input-field" placeholder="Usuario">
                <input type="password" id="loginPassword" class="input-field" placeholder="Contraseña">
                <button class="btn-primary" id="loginBtn">Iniciar sesión</button>
                <button class="btn-secondary" id="showRegisterBtn">Registrarse</button>
            </div>
            
            <div id="registerForm" style="display:none;">
                <input type="text" id="regUsername" class="input-field" placeholder="Usuario">
                <input type="password" id="regPassword" class="input-field" placeholder="Contraseña">
                <input type="password" id="regConfirmPassword" class="input-field" placeholder="Confirmar contraseña">
                <button class="btn-primary" id="registerBtn">Registrarse</button>
                <button class="btn-secondary" id="showLoginBtn">Ya tengo cuenta</button>
            </div>
        </div>
    </div>

    <!-- MODAL SUBIR VIDEO -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content large">
            <button class="close-modal" id="closeUploadModal">&times;</button>
            <h2 style="color:#8b5cf6; margin-bottom:20px;"><i class="fas fa-cloud-upload-alt"></i> Subir video</h2>
            
            <div class="dropzone" id="dropzone">
                <i class="fas fa-file-video" style="font-size:4rem; color:#8b5cf6;"></i>
                <p style="color:white; margin:15px 0;">Arrastra o haz clic para seleccionar</p>
                <input type="file" id="fileInput" accept="video/*" style="display:none;">
            </div>
            <div id="fileInfo" class="file-info hidden" style="color:#a796e0; text-align:center; margin:10px 0;"></div>
            <input type="text" id="videoTitle" class="input-field" placeholder="Título del video">
            <button class="btn-primary" id="publishVideoBtn">Publicar video</button>
        </div>
    </div>

    <!-- MODAL VER VIDEO -->
    <div class="modal-overlay" id="videoModal">
        <div class="modal-content large">
            <button class="close-modal" id="closeVideoModal">&times;</button>
            <video id="videoPlayer" controls style="width:100%; border-radius:24px; background:#000;" src=""></video>
            <h3 id="modalVideoTitle" style="color:white; margin-top:15px;"></h3>
        </div>
    </div>

    <script>
        (function() {
            // ========== CONFIGURACIÓN DE SUPABASE (TUS DATOS) ==========
            const SUPABASE_URL = 'https://wshznrtkllnvqwmmrfwo.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzaHpucnRrbGxudnF3bW1yZndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNjc2NzAsImV4cCI6MjA4Nzk0MzY3MH0.QtqJOiumaKnPbUK88NNlAq1gFx40NmF0_jctDixRP-A';
            
            // Inicializar Supabase
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // ========== VARIABLES ==========
            let currentUser = null;
            let videos = JSON.parse(localStorage.getItem('nexusVideos')) || [];
            
            // Videos por defecto
            if (videos.length === 0) {
                videos = [
                    { id: '1', title: '🔮 Nexus AI · El futuro morado', channel: 'NexusLab', duration: '12:34', views: '45K', timeAgo: 'hace 2 días', videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4' },
                    { id: '2', title: '⚡ Blueprint 3D · azul profundo', channel: 'BluePixel', duration: '8:17', views: '22K', timeAgo: 'hace 5 horas', videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4' }
                ];
                localStorage.setItem('nexusVideos', JSON.stringify(videos));
            }

            // ========== FUNCIONES ==========
            
            async function registerUser(username, password) {
                try {
                    const { data: existingUsers, error: searchError } = await supabase
                        .from('nexus_users')
                        .select('*')
                        .eq('username', username);
                    
                    if (searchError) throw searchError;
                    
                    if (existingUsers && existingUsers.length > 0) {
                        return { success: false, message: 'El usuario ya existe' };
                    }
                    
                    const { data, error } = await supabase
                        .from('nexus_users')
                        .insert([{ username: username, password: password }])
                        .select();
                    
                    if (error) throw error;
                    
                    return { success: true, data: data[0] };
                } catch (error) {
                    console.error('Error al registrar:', error);
                    return { success: false, message: 'Error en el servidor' };
                }
            }
            
            async function loginUser(username, password) {
                try {
                    const { data, error } = await supabase
                        .from('nexus_users')
                        .select('*')
                        .eq('username', username)
                        .eq('password', password);
                    
                    if (error) throw error;
                    
                    if (data && data.length > 0) {
                        return { success: true, user: data[0] };
                    } else {
                        return { success: false, message: 'Usuario o contraseña incorrectos' };
                    }
                } catch (error) {
                    console.error('Error al iniciar sesión:', error);
                    return { success: false, message: 'Error en el servidor' };
                }
            }
            
            async function checkSession() {
                const savedUser = localStorage.getItem('currentNexusUser');
                if (savedUser) {
                    const user = JSON.parse(savedUser);
                    const { data, error } = await supabase
                        .from('nexus_users')
                        .select('*')
                        .eq('id', user.id);
                    
                    if (!error && data && data.length > 0) {
                        currentUser = data[0];
                        updateUI();
                    } else {
                        localStorage.removeItem('currentNexusUser');
                    }
                }
            }

            // ========== UI ==========
            function updateUI() {
                const userDisplay = document.getElementById('userDisplayName');
                if (userDisplay) {
                    userDisplay.textContent = currentUser ? currentUser.username : 'Invitado';
                }
            }

            function renderVideos() {
                const videoGrid = document.getElementById('videoGrid');
                if (!videoGrid) return;
                
                videoGrid.innerHTML = '';
                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="thumbnail">
                            <i class="fas fa-play-circle" style="font-size:3rem; color:#503f8e;"></i>
                            <span class="duration">${video.duration}</span>
                        </div>
                        <div style="padding:14px;">
                            <div style="font-weight:600; color:white;">${video.title}</div>
                            <div style="color:#b79aff; margin:8px 0;">${video.channel}</div>
                            <div style="display:flex; justify-content:space-between; color:#b5b0d6; font-size:0.85rem;">
                                <span>👁️ ${video.views}</span> <span>${video.timeAgo}</span>
                            </div>
                        </div>
                    `;
                    card.onclick = () => {
                        document.getElementById('videoModal').style.display = 'flex';
                        document.getElementById('videoPlayer').src = video.videoUrl;
                        document.getElementById('modalVideoTitle').textContent = video.title;
                    };
                    videoGrid.appendChild(card);
                });
            }

            // ========== EVENTOS ==========
            
            document.getElementById('loginBtn').onclick = async () => {
                const username = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;
                
                const result = await loginUser(username, password);
                
                if (result.success) {
                    currentUser = result.user;
                    localStorage.setItem('currentNexusUser', JSON.stringify(result.user));
                    document.getElementById('authModal').style.display = 'none';
                    updateUI();
                } else {
                    alert(result.message);
                }
            };

            document.getElementById('registerBtn').onclick = async () => {
                const username = document.getElementById('regUsername').value;
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirmPassword').value;
                
                if (!username || !password) {
                    alert('Completa todos los campos');
                    return;
                }
                if (password !== confirm) {
                    alert('Las contraseñas no coinciden');
                    return;
                }
                
                const result = await registerUser(username, password);
                
                if (result.success) {
                    alert('Registro exitoso. Ahora inicia sesión.');
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                    
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regConfirmPassword').value = '';
                } else {
                    alert(result.message);
                }
            };

            document.getElementById('showRegisterBtn').onclick = () => {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            };
            
            document.getElementById('showLoginBtn').onclick = () => {
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
            };

            document.getElementById('uploadIconNav').onclick = () => {
                if (!currentUser) document.getElementById('authModal').style.display = 'flex';
                else document.getElementById('uploadModal').style.display = 'flex';
            };
            
            document.getElementById('uploadSidebarBtn').onclick = () => {
                if (!currentUser) document.getElementById('authModal').style.display = 'flex';
                else document.getElementById('uploadModal').style.display = 'flex';
            };
            
            document.getElementById('profileDisplay').onclick = () => document.getElementById('authModal').style.display = 'flex';

            // Cerrar modales
            document.getElementById('closeAuthModal').onclick = () => document.getElementById('authModal').style.display = 'none';
            document.getElementById('closeUploadModal').onclick = () => document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('closeVideoModal').onclick = () => {
                document.getElementById('videoModal').style.display = 'none';
                document.getElementById('videoPlayer').pause();
            };

            // SUBIR VIDEO
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');
            let selectedFile = null;

            dropzone.onclick = () => fileInput.click();
            
            fileInput.onchange = (e) => {
                selectedFile = e.target.files[0];
                if (selectedFile) {
                    const fileInfo = document.getElementById('fileInfo');
                    fileInfo.style.display = 'block';
                    fileInfo.textContent = `📁 ${selectedFile.name} (${(selectedFile.size/1024/1024).toFixed(2)} MB)`;
                }
            };

            document.getElementById('publishVideoBtn').onclick = () => {
                if (!currentUser) { alert('Debes iniciar sesión'); return; }
                
                const title = document.getElementById('videoTitle').value;
                if (!selectedFile || !title) { alert('Selecciona un video y escribe un título'); return; }

                const newVideo = {
                    id: Date.now().toString(),
                    title: title,
                    channel: currentUser.username,
                    duration: '00:00',
                    views: '0',
                    timeAgo: 'ahora',
                    videoUrl: URL.createObjectURL(selectedFile)
                };
                
                videos.unshift(newVideo);
                localStorage.setItem('nexusVideos', JSON.stringify(videos));
                renderVideos();
                document.getElementById('uploadModal').style.display = 'none';
                
                document.getElementById('videoTitle').value = '';
                document.getElementById('fileInfo').style.display = 'none';
                fileInput.value = '';
                selectedFile = null;
                
                alert('¡Video publicado con éxito!');
            };

            // ========== INICIALIZAR ==========
            renderVideos();
            checkSession();
            
            setTimeout(() => {
                if (!currentUser) document.getElementById('authModal').style.display = 'flex';
            }, 500);
        })();
    </script>
</body>
</html>
